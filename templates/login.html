{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/SENAI_logo_2024.png" alt="SENAI" class="img-fluid mb-4" style="max-height: 80px; object-fit: contain;">
            <h4 class="fw-bold text-uppercase" style="letter-spacing: 0.1em; color: var(--senai-grey-dark);">Gestão de Patrimônio</h4>
            <div class="badge bg-danger rounded-0 px-3 py-2 mb-4">PLATAFORMA SAAS</div>
        </div>
        
        <div class="card shadow-sm border-0 p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Digite seu login" required autocomplete="username">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">ACESSAR SISTEMA</button>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('esqueci_senha') }}" class="text-muted small text-decoration-none">Esqueci minha senha</a>
                </div>
            </form>
        </div>
        
        <div class="mt-4 text-center">
            <small class="text-muted text-uppercase fw-bold" style="font-size: 0.65rem;">SENAI São Paulo • Todos os direitos reservados</small>
        </div>
    </div>
</div>
{% endblock %}
