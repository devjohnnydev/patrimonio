{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Bem-vindo</h2>
                <p class="text-muted">Acesse o sistema de patrimônio</p>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            </form>
            
            <div class="mt-4 text-center">
                <small class="text-muted">Acesso restrito a colaboradores autorizados.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
