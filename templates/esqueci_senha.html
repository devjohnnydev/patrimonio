{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/SENAI_logo_2024.png" alt="SENAI" class="img-fluid mb-4" style="max-height: 80px; object-fit: contain;">
            <h5 class="fw-bold text-uppercase" style="letter-spacing: 0.08em;">Redefinir Senha</h5>
            <p class="text-muted small">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        </div>

        <div class="card shadow-sm border-0 p-4">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase">E-mail Cadastrado</label>
                    <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase">Enviar Link de Redefinição</button>
            </form>
        </div>

        <div class="mt-3 text-center">
            <a href="{{ url_for('login') }}" class="text-muted small text-decoration-none">← Voltar ao login</a>
        </div>
    </div>
</div>
{% endblock %}
